name: Build AdiXtream APK

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch: # Memungkinkan kamu nge-build manual dari tab Actions

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Dibutuhkan untuk mengambil git-hash yang benar

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build APK with Gradle
      # =================================================================
      # INI BAGIAN PALING PENTING: Menyuntikkan Github Secrets ke Gradle
      # =================================================================
      env:
        # Rahasia Level 2 (Kunci XOR)
        XOR_SECRET_KEY: ${{ secrets.XOR_SECRET_KEY }}
        
        # Rahasia URL Base64
        PREMIUM_REPO_ENCODED: ${{ secrets.PREMIUM_REPO_ENCODED }}
        FREE_REPO_ENCODED: ${{ secrets.FREE_REPO_ENCODED }}
        FIREBASE_URL_ENCODED: ${{ secrets.FIREBASE_URL_ENCODED }}
        
        # Rahasia Keystore (Opsional: Jika kamu simpan password keystore di Secrets)
        # Jika tidak pakai secret untuk keystore, baris di bawah ini boleh dihapus/dibiarkan
        KEYSTORE_PATH: ${{ secrets.KEYSTORE_PATH }}
        KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
        ALIAS: ${{ secrets.ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      
      # Menjalankan perintah build untuk flavor "stable" dan tipe "release"
      run: ./gradlew assembleStableRelease --no-daemon

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AdiXtream-Release-APK
        # Path ini menyesuaikan dengan output Gradle dari CloudStream/AdiXtream
        path: app/build/outputs/apk/stable/release/*.apk
